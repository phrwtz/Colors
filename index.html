<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Colors v1</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <h1>Colors</h1>
        <p class="scoreline" aria-live="polite">Score: <span id="score-value">0</span></p>
      </header>

      <section class="controls" aria-label="Game controls">
        <button id="undo-btn" type="button">Undo</button>
        <button id="reset-btn" type="button">Reset</button>
        <button id="new-board-btn" type="button">New Board</button>
      </section>

      <section class="legend" aria-label="Color legend">
        <div class="mixline" role="note" aria-label="Color mixing equations">
          <span class="mix-eq">
            <span class="swatch blue"></span><span class="mix-label">Blue</span>
            <span class="mix-symbol">+</span>
            <span class="swatch red"></span><span class="mix-label">Red</span>
            <span class="mix-symbol">=</span>
            <span class="swatch orange"></span><span class="mix-label">Orange</span>
          </span>
          <span class="mix-sep">|</span>
          <span class="mix-eq">
            <span class="swatch blue"></span><span class="mix-label">Blue</span>
            <span class="mix-symbol">+</span>
            <span class="swatch yellow"></span><span class="mix-label">Yellow</span>
            <span class="mix-symbol">=</span>
            <span class="swatch green"></span><span class="mix-label">Green</span>
          </span>
          <span class="mix-sep">|</span>
          <span class="mix-eq">
            <span class="swatch red"></span><span class="mix-label">Red</span>
            <span class="mix-symbol">+</span>
            <span class="swatch green"></span><span class="mix-label">Green</span>
            <span class="mix-symbol">=</span>
            <span class="swatch yellow"></span><span class="mix-label">Yellow</span>
          </span>
        </div>
      </section>

      <section class="board-wrap" aria-label="Colors board">
        <svg id="board" role="img" aria-label="Hex board"></svg>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
